spring.application.name=member-management

# ==================== 应用配置 ====================
server.port=8087

# ==================== 数据库配置 ====================
spring.datasource.url=jdbc:mysql://localhost:3306/ecards?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA配置
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Shanghai
spring.jpa.properties.hibernate.hbm2ddl.halt-on-error=false

# ==================== Redis配置 ====================
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.database=0
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-wait=-1ms
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0

# ==================== 日志配置 ====================
# 日志级别
logging.level.root=INFO
logging.level.com.ecards.member_management=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN

# 控制台日志格式
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# 日志文件配置
logging.file.name=logs/member-management.log
logging.file.max-size=10MB
logging.file.max-history=30
logging.file.total-size-cap=1GB
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# ==================== 加密配置 ====================
# AES-256-CBC 密钥配置（用于手机号加密，32字节Base64编码）
encryption.aes.secret-key=your-aes-256-cbc-secret-key-base64-here

# ==================== JWT令牌配置 ====================
# JWT签名密钥（HS256算法，256位Base64编码，生产环境必须替换）
jwt.secret-key=YourJwtSecretKeyHere123456789012345678901234567890==

# 令牌过期时间配置（单位：毫秒）
# 普通令牌：2小时 = 7200000毫秒
jwt.expiration.normal=7200000
# 特权令牌：5分钟 = 300000毫秒
jwt.expiration.privilege=300000
# 工作令牌：1小时 = 3600000毫秒
jwt.expiration.work=3600000
# 管理令牌：5分钟 = 300000毫秒
jwt.expiration.manager=300000
# 自动登录令牌：7天 = 604800000毫秒
jwt.expiration.auto-login=604800000
# 短期自动登录令牌：8小时 = 28800000毫秒
jwt.expiration.auto-login-short=28800000

# 管理令牌最大使用次数
jwt.manager.max-use-count=5

# ==================== Cookie配置 ====================
# Cookie域名（开发环境留空，生产环境设置域名）
cookie.domain=
# Cookie安全标志（开发环境false，生产环境true）
cookie.secure=false
# Cookie SameSite策略（防CSRF攻击）
cookie.same-site=Lax

# ==================== 应用时区配置 ====================
# 统一时区为 Asia/Shanghai
spring.jackson.time-zone=Asia/Shanghai
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss

# ==================== 阿里云 OSS 配置 ====================
# OSS 访问域名（不带 https://）
aliyun.oss.endpoint=oss-cn-hangzhou.aliyuncs.com
# Bucket 名称
aliyun.oss.bucket-name=ecards-test1
# AccessKey ID（生产环境使用环境变量 OSS_ACCESS_KEY_ID）
aliyun.oss.access-key-id=your-oss-access-key-id
# AccessKey Secret（生产环境使用环境变量 OSS_ACCESS_KEY_SECRET）
aliyun.oss.access-key-secret=your-oss-access-key-secret
# URL 前缀
aliyun.oss.url-prefix=https://ecards-test1.oss-cn-hangzhou.aliyuncs.com

# ==================== 阿里云 STS 配置 ====================
# RAM角色ARN（用于生成临时访问凭证）
aliyun.sts.role-arn=acs:ram::1501661548160479:role/ecards-test2
# 角色会话名称（建议使用应用名称）
aliyun.sts.role-session-name=ecards-merchant-upload
# 临时凭证有效期（单位：秒，建议1800秒=30分钟）
aliyun.sts.duration-seconds=1800
# STS访问控制策略
# 支持的路径类型: merchant/user/member/card/employee/resource
aliyun.sts.policy={"Version":"1","Statement":[{"Effect":"Allow","Action":["oss:PutObject","oss:DeleteObject","oss:GetObject"],"Resource":["acs:oss:*:*:ecards-test1/merchant/*","acs:oss:*:*:ecards-test1/user/*","acs:oss:*:*:ecards-test1/member/*","acs:oss:*:*:ecards-test1/card/*","acs:oss:*:*:ecards-test1/employee/*","acs:oss:*:*:ecards-test1/resource/*"]}]}
# 子账号AccessKey（用于调用AssumeRole，必须可以承担角色）
aliyun.sts.sub-access-key-id=your-sts-sub-access-key-id
aliyun.sts.sub-access-key-secret=your-sts-sub-access-key-secret

# 文件上传配置
file.upload.max-size=5242880
file.upload.allowed-types=image/jpeg,image/png,image/jpg

# ==================== 管理员系统配置 ====================
# 管理员初始化配置（首次启动自动创建超管）
admin.init.phone=your-admin-phone
admin.init.account=superadmin
admin.init.password=your-admin-password
admin.init.snd-password=your-admin-snd-password

# AdminToken JWT配置
admin.jwt.secret=${ADMIN_JWT_SECRET:AdminSecretKeyForEcardsSystemMustBeVeryLongAndSecure2025==}
admin.jwt.expiration=7200000
# 2小时 = 7200秒 = 7200000毫秒

# 操作日志保留天数
admin.log.retention.days=90